name: Deploy Test Backend to Uberspace

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # -------------------------------
      # Repository auschecken
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # JDK 21 Setup
      # -------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # -------------------------------
      # Spring Boot JAR bauen
      # -------------------------------
      - name: Build Spring Boot JAR
        run: |
          cd ./backend
          mvn clean package -DskipTests

      # -------------------------------
      # SSH Key vorbereiten
      # -------------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UBERSPACE_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.UBERSPACE_HOST }} >> ~/.ssh/known_hosts

      # -------------------------------
      # App hochladen
      # -------------------------------
      - name: Upload app.jar
        run: |
          cd ./backend
          scp target/*SNAPSHOT.jar ${{ secrets.UBERSPACE_USER }}@${{ secrets.UBERSPACE_HOST }}:/home/${{ secrets.UBERSPACE_USER }}/backend-test/app.jar

      # -------------------------------
      # Serverseitiges Deployment
      # -------------------------------
      - name: Start Test Backend on Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.UBERSPACE_USER }}@${{ secrets.UBERSPACE_HOST }} << 'EOF'
            set -e

            APP_DIR=~/backend-test
            SCREEN_NAME=backend-test
            LOG_FILE=$APP_DIR/app.log

            mkdir -p $APP_DIR
            cd $APP_DIR

            # Alte Screen-Session beenden, falls vorhanden
            screen -ls | grep -q "$SCREEN_NAME" && screen -S $SCREEN_NAME -X quit || true

            # Starte Spring Boot in detached Screen mit Logging und Environment Variable
            screen -AmdS $SCREEN_NAME bash -c "export MONGODB_URI='${MONGODB_URI}'; java -jar app.jar --server.port=8082 > $LOG_FILE 2>&1"
            EOF
