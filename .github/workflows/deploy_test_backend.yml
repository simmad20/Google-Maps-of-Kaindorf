name: Deploy Test Backend to Uberspace

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Repository auschecken
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # JDK 21 Setup
      # -------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # -------------------------------
      # Spring Boot JAR bauen
      # -------------------------------
      - name: Build Spring Boot JAR
        run: |
          cd ./backend
          mvn clean package -DskipTests

      # -------------------------------
      # SSH Key vorbereiten
      # -------------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UBERSPACE_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.UBERSPACE_HOST }} >> ~/.ssh/known_hosts

      # -------------------------------
      # Sicherstellen, dass Remote-Ordner existiert
      # -------------------------------
      - name: Ensure remote directory exists
        run: |
          ssh ${{ secrets.UBERSPACE_USER }}@${{ secrets.UBERSPACE_HOST }} \
           "mkdir -p ~/backend-test"

      # -------------------------------
      # App hochladen
      # -------------------------------
      - name: Upload app.jar
        run: |
          cd ./backend
          scp target/*SNAPSHOT.jar \
            ${{ secrets.UBERSPACE_USER }}@${{ secrets.UBERSPACE_HOST }}:/home/${{ secrets.UBERSPACE_USER }}/backend-test/app.jar

      # -------------------------------
      # Test-Backend starten mit Screen + Logs + MongoDB Secret
      # -------------------------------
      - name: Restart test backend
        run: |
          ssh ${{ secrets.UBERSPACE_USER }}@${{ secrets.UBERSPACE_HOST }} << 'EOF'
            cd ~/backend-test

            # alte Test-Backend Screen-Session schließen, falls vorhanden
            screen -ls | grep -q "backend-test" && screen -S backend-test -X quit || true

            # Test-Backend in separatem Screen starten, Logfile app.log schreiben
            screen -dmS backend-test bash -c "export MONGODB_URI='${{ secrets.MONGODB_URI }}'; java -jar app.jar --server.port=8082 > app.log 2>&1"
          EOF
