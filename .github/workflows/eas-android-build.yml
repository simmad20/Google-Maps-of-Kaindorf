name: Expo Android Production Build + Drive Upload

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:   # manuell startbar

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Repo Checkout
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Install Dependencies
      # -------------------------
      - name: Install dependencies
        working-directory: HandyApp/MapsOfKaindorf
        run: npm install

      # -------------------------
      # Install Expo & EAS CLI
      # -------------------------
      - name: Install Expo & EAS CLI
        run: |
          npm install -g expo
          npm install -g eas-cli

      # -------------------------
      # Expo & EAS Auth Check
      # -------------------------
      - name: Verify Expo & EAS login
        working-directory: HandyApp/MapsOfKaindorf
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Checking Expo login..."
          if ! expo whoami > /dev/null 2>&1; then
            echo "ERROR: Not logged in to Expo! Aborting."
            exit 1
          fi

          echo "Checking EAS login..."
          if ! eas whoami > /dev/null 2>&1; then
            echo "ERROR: Not logged in to EAS! Aborting."
            exit 1
          fi

      # -------------------------
      # EAS Build (AAB)
      # -------------------------
      - name: Build Android AAB with EAS
        working-directory: HandyApp/MapsOfKaindorf
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build -p android --profile production --non-interactive --json > build-result.json

      # -------------------------
      # Extract AAB URL & App Version
      # -------------------------
      - name: Extract AAB download URL & version
        working-directory: HandyApp/MapsOfKaindorf
        run: |
          sudo apt-get install -y jq
          AAB_URL=$(jq -r '.[0].artifacts.buildUrl' build-result.json)
          echo "AAB_URL=$AAB_URL" >> $GITHUB_ENV

          APP_VERSION=$(jq -r '.expo.version' app.json)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      # -------------------------
      # Download AAB
      # -------------------------
      - name: Download AAB
        working-directory: HandyApp/MapsOfKaindorf
        run: |
          mkdir -p builds
          FILENAME="application-mapsofkaindorf-v${APP_VERSION}.aab"
          echo "Downloading AAB as $FILENAME"
          curl -L "$AAB_URL" -o builds/$FILENAME
          echo "AAB_FILE=builds/$FILENAME" >> $GITHUB_ENV

      # -------------------------
      # Upload as GitHub Artifact
      # -------------------------
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapsOfKaindorf-AAB
          path: ${{ env.AAB_FILE }}

      # -------------------------
      # Upload to Google Drive
      # -------------------------
      - name: Upload to Google Drive
        uses: satackey/action-google-drive@v1
        with:
          google_credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          upload_file: ${{ env.AAB_FILE }}
          parent_folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: true